# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Code quality

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        task: [check, 'check:types']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'npm'
      - name: npm install
        run: npm i
      - name: Run Task
        run: npm run ${{ matrix.task }}
